services:
  - type: web
    name: jims-pos-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # You will paste your Supabase URL in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a fresh secure key for you!
