<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Vendrax - Premium Enterprise Point of Sale and Inventory Management System." />
  <title>Vendrax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background-color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .splash-logo-container {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      background-color: #0f172a;
      border: 3px solid #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
    }
    #splash-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.15);
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="splash-logo-container">
      <img id="splash-logo" src="/icon.png" alt="Vendrax Logo" title="Loading..." />
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    try {
      const storedLogo = localStorage.getItem('companyLogo');
      if (storedLogo) {
        const splash = document.getElementById('splash-logo');
        if (splash) splash.src = storedLogo;
      }
    } catch(e) {}
    
    // Hide loader when page is fully loaded and React has started
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('global-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 300);
        }
      }, 500);
    });
  </script>
</body>

</html>
